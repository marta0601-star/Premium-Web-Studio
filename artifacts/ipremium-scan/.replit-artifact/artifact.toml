kind = "web"
previewPath = "/"
title = "iPremium Scan"
version = "1.0.0"
id = "artifacts/ipremium-scan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20381

[services.development]
run = "pnpm --filter @workspace/ipremium-scan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ipremium-scan", "run", "build" ]
publicDir = "artifacts/ipremium-scan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20381"
BASE_PATH = "/"
